name: Gerar instalador Windows

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Instalar dependencias
        run: npm install

      - name: Gerar instalador
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_BUILDER_NO_AUTO_RELEASE: 1
        run: npm run build

      - name: Disponibilizar instalador para download
        uses: actions/upload-artifact@v4
        with:
          name: Registro-de-Regras-SAPIA-installer
          path: dist/*.exe
          retention-days: 30
